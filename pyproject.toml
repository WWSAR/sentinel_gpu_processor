[build-system]
requires = ["setuptools>=61.0", "wheel", "numpy"]
build-backend = "setuptools.build_meta"

[project]
name = "s1proc"
version = "0.1.0"
description = "GPU-accelerated Sentinel-1 SAR processing tools"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Ke Wang", email = "kewang@utexas.edu" }]
requires-python = ">=3.9"
dependencies = [
    "matplotlib",
    "numpy",
    "numba",
    "pandas"
]

