name: CI Multi-Platform Rattler Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  matrix_build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Matrix testing: Validate both Windows 64-bit and Linux 64-bit simultaneously
        os: [windows-latest, ubuntu-latest]

    steps:
      # 1. Pull the source code from the repository
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Force activate the x64 Native Developer Toolset on Windows runner to prevent memory limit errors
      - name: Setup MSVC (Windows only)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 3. Install and configure the ultra-fast rattler-build toolchain
      - name: Setup rattler-build
        uses: prefix-dev/setup-rattler@v1

      # 4. Execute cross-platform compilation. 
      # Note: --no-test is used because GitHub hosted runners lack physical NVIDIA GPUs; 
      # this focuses purely on validating whether the package compiles and builds successfully.
      - name: Run rattler-build
        run: |
          rattler-build build --recipe recipe.yaml -c nvidia -c conda-forge

      # 5. Optional: Upload the built .conda packages as build artifacts to GitHub Actions UI for download
      - name: Upload Conda Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: s1proc-package-${{ matrix.os }}
          path: output/**/*.conda