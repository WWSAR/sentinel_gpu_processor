name: s1proc-cuda-build

on:
  push:
  pull_request:

jobs:

  # =========================
  # LINUX BUILD (PRIMARY)
  # =========================
  linux-build:
    runs-on: ubuntu-latest

    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Install micromamba
      # -------------------------
      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: build
          init-shell: bash
          create-args: >-
            python=3.11
            cmake
            ninja
            libtiff
            sqlite
            pip

      - name: Configure CMake
        shell: micromamba-shell {0}
        run: |
          cmake -S csrc -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$CONDA_PREFIX

      - name: Build CUDA executables
        shell: micromamba-shell {0}
        run: cmake --build build

      - name: Collect binaries
        shell: micromamba-shell {0}
        run: |
          mkdir -p s1proc/bin
          cp build/* s1proc/bin/ || true
          find build -type f -executable -exec cp {} s1proc/bin/ \;

      - name: Build Python wheel
        shell: micromamba-shell {0}
        run: |
          pip install build
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-wheel
          path: dist/*


  # =========================
  # WINDOWS BUILD
  # =========================
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space (Linux)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          swap-storage: false

      - name: Free Disk Space (Windows/macOS)
        if: runner.os != 'Linux'
        uses: hugoalh/disk-space-optimizer-ghaction@v0.8.0

      - name: Setup MSVC (cl.exe) environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64          # 64-bit architecture
          toolset: 14.40 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CUDA
        uses: Jimver/cuda-toolkit@v0.2.22
        with:
          cuda: '11.8.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'
          use-github-cache: true

      - name: Verify nvcc
        run: nvcc --version

      # -------------------------
      # Install micromamba
      # -------------------------
      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: build
          init-shell: bash
          create-args: >-
            python=3.11
            cmake
            ninja
            libtiff
            sqlite
            pip

      - name: Configure CMake
        shell: bash -l {0}
        run: |
          cmake -S csrc -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$CONDA_PREFIX

      - name: Build CUDA executables
        shell: bash -l {0}
        run: cmake --build build

      - name: Collect binaries
        run: |
          mkdir s1proc\bin
          Get-ChildItem -Recurse build -Filter *.exe | Copy-Item -Destination s1proc\bin

      - name: Build wheel
        shell: bash -l {0}
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-wheel
          path: dist/*