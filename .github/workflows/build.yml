name: s1proc-cuda-build

on:
  push:
  pull_request:

jobs:

  # =========================
  # LINUX BUILD (PRIMARY)
  # =========================
  linux-build:
    runs-on: ubuntu-latest

    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3 python3-pip

      - name: Configure CMake
        run: |
          cmake -S csrc -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build CUDA executables
        run: cmake --build build

      - name: Collect binaries
        run: |
          mkdir -p s1proc/bin
          cp build/* s1proc/bin/ || true
          find build -type f -executable -exec cp {} s1proc/bin/ \;

      - name: Build Python wheel
        run: |
          pip install build
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-wheel
          path: dist/*


  # =========================
  # WINDOWS BUILD
  # =========================
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          pip install cmake ninja build

      # IMPORTANT:
      # Windows runners already support MSVC + CUDA runtime libs
      # We avoid CUDA installer entirely

      - name: Configure CMake
        run: |
          cmake -S csrc -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build CUDA executables
        run: cmake --build build

      - name: Collect binaries
        run: |
          mkdir s1proc\bin
          Get-ChildItem -Recurse build -Filter *.exe | Copy-Item -Destination s1proc\bin

      - name: Build wheel
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-wheel
          path: dist/*